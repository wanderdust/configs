# Use vim keybindings in copy mode
setw -g mode-keys vi


# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a

# Mouse support
set -g mouse on

# Split panes
bind | split-window -h
bind - split-window -v

# Easier pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Default text color (white for active, grey for inactive)
set -g window-style bg=black,fg=brightblack
set -g window-active-style 'fg=white'

# Resize with prefix + Shift-H/J/K/L
bind -r H resize-pane -L 10
bind -r J resize-pane -D 10
bind -r K resize-pane -U 10
bind -r L resize-pane -R 10

# Active (focused) pane border: bright and clear
set -g pane-active-border-style 'fg=brightmagenta,bold'

bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"


# Yazi related - https://rushter.com/blog/helix-editor/
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

bind-key y display-popup -d '#{pane_current_path}' -x R -h 95% -w 95% -E 'tmux new-session yazi \; set status off'
bind-key g popup -E -w 95% -h 95%  -d '#{pane_current_path}' lazygit
bind-key e display-popup -w 95% -h 90% -E "tmux capture-pane -Jp -S- | hx -"



## TMUX PLUGIN MANAGER
# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @sidebar-tree-command 'tree -C'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
